<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d1117">
  <title>Control Mesero Robot</title>
  <link rel="stylesheet" href="style.css?v=7">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div class="app">

    <!-- ═══ HEADER + CONEXIÓN ═══ -->
    <header class="header">
      <div class="header-row">
        <div class="header-left">
          <span class="header-logo">🤖</span>
          <h1>Mesero Robot</h1>
        </div>
        <div class="conn-badge" id="connStatus">
          <span class="dot" id="connDot"></span>
          <span id="connText">Offline</span>
        </div>
      </div>

      <div class="url-bar">
        <div class="url-input-wrap">
          <span class="url-icon">🔌</span>
          <input type="text" id="baseUrl" placeholder="http://IP_DEL_ROBOT:8080" value="">
        </div>
        <button class="btn-connect" onclick="testConnection()">Conectar</button>
      </div>
    </header>

    <!-- ═══ SPLIT LAYOUT: CONTROLES + CONSOLA ═══ -->
    <main class="split-layout">

      <!-- ─── Panel izquierdo: Controles (scrollable) ─── -->
      <div class="controls-panel">

        <!-- ─── Control ─── -->
        <section class="block">
          <div class="block-header">
            <span class="block-icon">📡</span>
            <span class="block-title">Detección</span>
          </div>
          <div class="action-grid">
            <button class="action-card" onclick="callEndpoint('POST','/proximity/near')">
              <span class="action-card-icon">👋</span>
              <span class="action-card-label">Cerca</span>
              <span class="action-card-sub">Modo interactivo</span>
            </button>
            <button class="action-card" onclick="callEndpoint('POST','/proximity/away')">
              <span class="action-card-icon">🚶</span>
              <span class="action-card-label">Lejos</span>
              <span class="action-card-sub">Volver a reposo</span>
            </button>
          </div>
        </section>

        <section class="block">
          <div class="block-header">
            <span class="block-icon">🖥️</span>
            <span class="block-title">Pantalla</span>
          </div>
          <div class="action-grid">
            <button class="action-card accent" onclick="callEndpoint('POST','/greet')">
              <span class="action-card-icon">🗣️</span>
              <span class="action-card-label">Saludar</span>
              <span class="action-card-sub">Producto + audio</span>
            </button>
            <button class="action-card" onclick="callEndpoint('POST','/product')">
              <span class="action-card-icon">🖼️</span>
              <span class="action-card-label">Producto</span>
              <span class="action-card-sub">Solo imagen</span>
            </button>
            <button class="action-card danger" onclick="callEndpoint('POST','/cancel-payment')">
              <span class="action-card-icon">✖️</span>
              <span class="action-card-label">Cancelar</span>
              <span class="action-card-sub">Cancelar pago</span>
            </button>
          </div>
        </section>

        <!-- ─── Audios ─── -->
        <section class="block">
          <div class="block-header">
            <span class="block-icon">🔊</span>
            <span class="block-title">Audios</span>
          </div>
          <div class="action-grid cols-3">
            <button class="action-card" onclick="callEndpoint('POST','/play-question')">
              <span class="action-card-icon">❓</span>
              <span class="action-card-label">Pregunta</span>
            </button>
            <button class="action-card" onclick="callEndpoint('POST','/play-thanks')">
              <span class="action-card-icon">🙏</span>
              <span class="action-card-label">Gracias</span>
            </button>
            <button class="action-card" onclick="callEndpoint('POST','/play-buy')">
              <span class="action-card-icon">🛒</span>
              <span class="action-card-label">Comprar</span>
            </button>
            <button class="action-card" onclick="callEndpoint('POST','/play-order')">
              <span class="action-card-icon">🔔</span>
              <span class="action-card-label">Orden</span>
            </button>
            <button class="action-card" onclick="callEndpoint('POST','/play-attention')">
              <span class="action-card-icon">⚠️</span>
              <span class="action-card-label">Atención</span>
            </button>
            <button class="action-card" onclick="callEndpoint('POST','/play-collect-tray')">
              <span class="action-card-icon">🍽️</span>
              <span class="action-card-label">Bandeja</span>
            </button>
            <button class="action-card" onclick="callEndpoint('POST','/play-coffee')">
              <span class="action-card-icon">☕</span>
              <span class="action-card-label">Café</span>
            </button>
            <button class="action-card danger" onclick="callEndpoint('POST','/audio/stop')">
              <span class="action-card-icon">🔇</span>
              <span class="action-card-label">Detener</span>
            </button>
          </div>

          <div class="audio-custom">
            <div class="audio-custom-row">
              <input type="text" id="customAsset" placeholder="Ruta del audio (ej: audio/alerta.wav)" value="audio/question_coffe_old2.wav">
            </div>
            <div class="audio-custom-row split">
              <input type="number" id="customVolume" placeholder="Vol" min="0" max="1" step="0.1" value="1.0">
              <label class="toggle-label">
                <input type="checkbox" id="customForce"> Forzar
              </label>
              <button class="btn-play" onclick="playCustomAudio()">▶️</button>
            </div>
          </div>
        </section>

        <!-- ─── Configuración ─── -->
        <section class="block">
          <div class="block-header">
            <span class="block-icon">⚙️</span>
            <span class="block-title">Configuración</span>
          </div>
          <div class="config-card">
            <button class="btn-outline" onclick="callEndpoint('GET','/config')">📋 Ver config actual</button>
            <input type="text" id="cfgBaseUrl" placeholder="Base URL del API">
            <input type="text" id="cfgToken" placeholder="Bearer Token">
            <div class="config-row">
              <input type="number" id="cfgMerchantId" placeholder="Merchant ID">
              <input type="number" id="cfgProductId" placeholder="Product ID">
            </div>
            <button class="btn-accent" onclick="updateConfig()">💾 Guardar configuración</button>
          </div>
        </section>

      </div>

      <!-- ─── Panel derecho: Consola (fija, siempre visible) ─── -->
      <div class="console-panel">
        <div class="console-header">
          <div class="console-header-left">
            <span class="block-icon">📟</span>
            <span class="block-title">Consola</span>
          </div>
          <button class="btn-clear" onclick="clearLogs()">Limpiar</button>
        </div>
        <div class="log-box" id="logBody"></div>
      </div>

    </main>

    <footer class="footer">Control Remoto · Mesero Robot</footer>
  </div>

  <script src="app.js?v=7"></script>
</body>
</html>
