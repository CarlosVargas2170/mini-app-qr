<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0f23">
  <title>Control Robot - Mini App QR</title>
  <link rel="stylesheet" href="style.css?v=2">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div class="app">
    <!-- HEADER -->
    <header class="header">
      <div class="header-top">
        <h1>🤖 Control Robot</h1>
        <div class="connection-status" id="connStatus">
          <span class="dot" id="connDot"></span>
          <span id="connText">Sin conexion</span>
        </div>
      </div>
      <div class="config-bar">
        <label for="baseUrl">URL del Totem:</label>
        <input type="text" id="baseUrl" placeholder="http://IP_DEL_TOTEM:8080" value="">
        <button class="btn-small btn-test" onclick="testConnection()">Probar</button>
      </div>
      <div class="hint">
        <small>Escribe la IP de la Jetson (ej: <code>http://192.168.1.50:8080</code>) o tu URL de ngrok.</small>
      </div>
    </header>

    <!-- LOGS -->
    <div class="log-panel" id="logPanel">
      <div class="log-header">
        <span>Consola</span>
        <button class="btn-clear" onclick="clearLogs()">Limpiar</button>
      </div>
      <div class="log-body" id="logBody"></div>
    </div>

    <!-- CONTROLES -->
    <main class="controls">

      <!-- PROXIMIDAD -->
      <section class="panel">
        <h2>📡 Proximidad</h2>
        <div class="btn-grid">
          <button class="btn btn-blue" onclick="callEndpoint('POST','/proximity/near')">
            <span class="icon">👋</span>
            <span class="label">Cerca</span>
            <span class="sub">Mostrar video</span>
          </button>
          <button class="btn btn-gray" onclick="callEndpoint('POST','/proximity/away')">
            <span class="icon">🚶</span>
            <span class="label">Lejos</span>
            <span class="sub">Volver a reposo</span>
          </button>
        </div>
      </section>

      <!-- PANTALLA -->
      <section class="panel">
        <h2>🖥️ Pantalla</h2>
        <div class="btn-grid">
          <button class="btn btn-green" onclick="callEndpoint('POST','/greet')">
            <span class="icon">🗣️</span>
            <span class="label">Saludar</span>
            <span class="sub">Producto + audio</span>
          </button>
          <button class="btn btn-yellow" onclick="callEndpoint('POST','/product')">
            <span class="icon">🖼️</span>
            <span class="label">Solo Producto</span>
            <span class="sub">Sin audio</span>
          </button>
        </div>
      </section>

      <!-- AUDIO -->
      <section class="panel">
        <h2>🔊 Audio</h2>
        <div class="btn-grid">
          <button class="btn btn-purple" onclick="callEndpoint('POST','/play-question')">
            <span class="icon">❓</span>
            <span class="label">Pregunta</span>
            <span class="sub">¿Deseas un cafe?</span>
          </button>
          <button class="btn btn-purple" onclick="callEndpoint('POST','/play-thanks')">
            <span class="icon">🙏</span>
            <span class="label">Gracias</span>
            <span class="sub">Agradecimiento</span>
          </button>
          <button class="btn btn-orange" onclick="callEndpoint('POST','/play-buy')">
            <span class="icon">🛒</span>
            <span class="label">Comprar</span>
            <span class="sub">Invitacion a compra</span>
          </button>
          <button class="btn btn-red" onclick="callEndpoint('POST','/audio/stop')">
            <span class="icon">🔇</span>
            <span class="label">Detener</span>
            <span class="sub">Parar audio</span>
          </button>
        </div>

        <!-- Audio personalizado -->
        <div class="form-block">
          <h3>Reproducir audio personalizado</h3>
          <div class="form-row">
            <input type="text" id="customAsset" placeholder="Ruta del asset (ej: audio/alerta.wav)" value="audio/question_coffe_old2.wav">
            <input type="number" id="customVolume" placeholder="Volumen" min="0" max="1" step="0.1" value="1.0" style="width:80px">
          </div>
          <label class="checkbox">
            <input type="checkbox" id="customForce"> Forzar (ignorar cooldown)
          </label>
          <button class="btn btn-purple btn-full" onclick="playCustomAudio()">
            <span class="icon">▶️</span> Reproducir
          </button>
        </div>
      </section>

      <!-- CONFIG -->
      <section class="panel">
        <h2>⚙️ Configuracion</h2>
        <button class="btn btn-teal btn-full" onclick="callEndpoint('GET','/config')">
          <span class="icon">📋</span> Ver configuracion actual
        </button>

        <div class="form-block">
          <h3>Actualizar configuracion</h3>
          <div class="form-row">
            <input type="text" id="cfgBaseUrl" placeholder="Base URL">
            <input type="text" id="cfgToken" placeholder="Bearer Token">
          </div>
          <div class="form-row">
            <input type="number" id="cfgMerchantId" placeholder="Merchant ID" style="width:48%">
            <input type="number" id="cfgProductId" placeholder="Product ID" style="width:48%">
          </div>
          <button class="btn btn-teal btn-full" onclick="updateConfig()">
            <span class="icon">💾</span> Guardar configuracion
          </button>
        </div>
      </section>

    </main>

    <footer class="footer">
      Mini App QR - Panel de Control Remoto
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
