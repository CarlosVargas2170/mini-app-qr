name: Build Flutter App for Linux ARM64

on:
  push:
    branches: 
      - main
      - fix/refactor
  workflow_dispatch:

jobs:
  build-linux-arm64:
    runs-on: ubuntu-22.04-arm 
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            curl git unzip cmake ninja-build \
            libgtk-3-dev liblzma-dev libstdc++-12-dev pkg-config \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-bad1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav \
            libgstreamer-plugins-base1.0-dev

      - name: Clone Flutter SDK
        run: |
          git clone --depth 1 --branch stable https://github.com/flutter/flutter.git $RUNNER_TEMP/flutter
          echo "$RUNNER_TEMP/flutter/bin" >> $GITHUB_PATH

      - name: Install Flutter dependencies
        run: flutter doctor

      - name: Enable Linux desktop support
        run: flutter config --enable-linux-desktop

      - name: Create Linux project files
        run: flutter create --platforms=linux .

      - name: Build the Linux app
        run: flutter build linux

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mi-app-linux-arm64
          path: build/linux/arm64/release/bundle/